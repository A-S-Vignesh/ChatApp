<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- App Title -->
  <title>AetherChat | Real-Time Messaging App</title>

  <!-- Description -->
  <meta name="description"
    content="AetherChat is a fast, secure, real-time chat application built with React and modern web technologies." />

  <!-- Keywords -->
  <meta name="keywords" content="chat app, real-time chat, messaging app, react chat, web chat application" />

  <!-- Author -->
  <meta name="author" content="Vignesh A S" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#2563eb" />

  <!-- ── PWA / Web App Manifest ── -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
  <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Aether" /> -->

  <!-- ── Apple / iOS PWA ── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AetherChat" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- ── Microsoft Tiles ── -->
  <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
  <meta name="msapplication-TileColor" content="#2563eb" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon"  href="/favicon.ico" />

  <!-- Open Graph -->
  <meta property="og:title" content="AetherChat | Real-Time Messaging App" />
  <meta property="og:description"
    content="Chat instantly with friends using AetherChat. Secure, fast, and beautifully designed." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://your-domain.com" />
  <meta property="og:image" content="/web-app-manifest-512x512.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AetherChat | Real-Time Messaging App" />
  <meta name="twitter:description" content="A modern real time chat app built with React." />
  <meta name="twitter:image" content="/web-app-manifest-512x512.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="/index.css" />
</head>

<body class="bg-slate-100 dark:bg-slate-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
